name: Deploy Production


on:
    push:
        tags:
            - 'v*.*.*'


jobs:

    deploy:

        runs-on: ubuntu-latest

        env:
            APP_ENV: prod


        steps:


            # =========================
            # CHECKOUT
            # =========================

            - name: Checkout

              uses: actions/checkout@v4

              with:
                  fetch-depth: 0



            # =========================
            # TAG SAFETY
            # =========================

            - name: Verify tag comes from main

              run: |
                  git fetch origin main --tags

                  if ! git branch -r --contains $GITHUB_SHA | grep origin/main; then
                    echo "❌ Tag must come from main branch"
                    exit 1
                  fi



            # =========================
            # PHP
            # =========================

            - name: Setup PHP

              uses: shivammathur/setup-php@v2

              with:
                  php-version: 8.4
                  extensions: mbstring, intl, pdo_mysql
                  coverage: none

            # =========================
            # COMPOSER
            # =========================

            - name: Validate composer

              run: |
                  composer validate --no-check-publish


            - name: Install Composer dependencies

              run: |
                  composer install \
                  --no-dev \
                  --optimize-autoloader \
                  --no-interaction \
                  --no-progress \
                  --no-scripts



            # =========================
            # NODE
            # =========================

            - name: Setup Node

              uses: actions/setup-node@v4

              with:
                  node-version: 22
                  cache: npm



            - name: Install npm dependencies

              run: |
                  npm ci



            - name: Build assets

              run: |
                  npm run build



            # =========================
            # SYMFONY
            # =========================

            - name: Symfony cache warmup

              run: |
                  php bin/console cache:warmup --env=prod



            # =========================
            # DEPLOY OVH SFTP
            # =========================

            - name: Deploy to OVH

              uses: appleboy/scp-action@v0.1.7

              with:

                  host: ${{ secrets.OVH_HOST }}

                  username: ${{ secrets.OVH_USER }}

                  password: ${{ secrets.OVH_PASSWORD }}

                  port: 22

                  source: "./"

                  target: "/sk-systems/"
