name: Deploy Production

on:
    push:
        branches:
            - main


jobs:

    deploy:

        runs-on: ubuntu-latest

        env:
            APP_ENV: prod


        steps:


            # =========================
            # CHECKOUT
            # =========================

            - name: Checkout
              uses: actions/checkout@v4



            # =========================
            # PHP
            # =========================

            - name: Setup PHP
              uses: shivammathur/setup-php@v2

              with:
                  php-version: 8.4
                  extensions: mbstring, intl, pdo_mysql
                  coverage: none



            # =========================
            # COMPOSER
            # =========================

            - name: Install Composer dependencies

              run: |
                  composer install \
                  --no-dev \
                  --optimize-autoloader \
                  --no-interaction \
                  --no-scripts



            # =========================
            # NODE
            # =========================

            - name: Setup Node

              uses: actions/setup-node@v4

              with:
                  node-version: 22
                  cache: npm



            - name: Install npm dependencies

              run: |
                  npm ci



            - name: Build assets

              run: |
                  npm run build



            # =========================
            # SYMFONY CACHE
            # =========================

            - name: Symfony cache warmup

              run: |
                  php bin/console cache:warmup --env=prod


            # =========================
            # DEPLOY SFTP OVH
            # =========================

            -   name: Deploy to OVH

                uses: wlixcc/SFTP-Deploy-Action@v1.2.4

                with:

                    server: ${{ secrets.OVH_HOST }}

                    username: ${{ secrets.OVH_USER }}

                    port: 22

                    ssh_private_key: ${{ secrets.OVH_SSH_PRIVATE_KEY }}

                    local_path: './'

                    remote_path: '/sk-systems/'
