name: Deploy Production

on:
    push:
        tags:
            - 'v*.*.*'

jobs:
    deploy:
        runs-on: ubuntu-latest

        env:
            APP_ENV: prod

        steps:
            # =========================
            # CHECKOUT
            # =========================

            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            # =========================
            # VERIFY TAG
            # =========================

            - name: Verify tag comes from main
              run: |
                  git fetch origin main --tags

                  if ! git branch -r --contains $GITHUB_SHA | grep -q "origin/main"; then
                    echo "❌ Tag must come from main branch"
                    exit 1
                  fi

            # =========================
            # PHP
            # =========================

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.4
                  extensions: mbstring, intl, pdo_mysql
                  coverage: none
                  tools: composer:v2

            - name: Cache Composer
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.composer/cache
                      ~/.cache/composer
                  key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-composer-

            # =========================
            # COMPOSER
            # =========================

            - name: Validate composer
              run: composer validate --no-check-publish

            - name: Install Composer dependencies
              run: |
                  composer install \
                    --no-dev \
                    --prefer-dist \
                    --optimize-autoloader \
                    --classmap-authoritative \
                    --no-interaction \
                    --no-progress \
                    --no-scripts

            # =========================
            # CHECK IF VENDOR CHANGED
            # =========================

            - name: Check Composer changes
              id: composer
              run: |
                  PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

                  if [ -z "$PREVIOUS_TAG" ]; then
                    echo "vendor=true" >> $GITHUB_OUTPUT
                  elif git diff --name-only "$PREVIOUS_TAG" HEAD | grep -q "^composer.lock$"; then
                    echo "vendor=true" >> $GITHUB_OUTPUT
                  else
                    echo "vendor=false" >> $GITHUB_OUTPUT
                  fi

            # =========================
            # NODE
            # =========================

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install npm dependencies
              run: npm ci

            - name: Build assets
              run: npm run build

            # =========================
            # CLEAR SYMFONY CACHE
            # =========================

            - name: Clear Symfony cache
              run: |
                  rm -rf var/cache/*

            # =========================
            # PREPARE DEPLOY PACKAGE
            # =========================

            -   name: Prepare deploy package
                run: |
                    rm -rf deploy
                    mkdir deploy

                    cp -R bin deploy/
                    cp -R config deploy/
                    cp -R migrations deploy/
                    cp -R public deploy/
                    cp -R src deploy/
                    cp -R templates deploy/
                    cp -R translations deploy/

                    echo "Copying vendor..."
                    time cp -R vendor deploy/
                    echo "Vendor copied."

                    mkdir -p deploy/var/cache
                    mkdir -p deploy/var/log

                    cp composer.json deploy/
                    cp composer.lock deploy/
                    cp symfony.lock deploy/

                    [ -f index.php ] && cp index.php deploy/

                    echo "===== STATS ====="
                    du -sh vendor
                    find vendor | wc -l
                    du -sh deploy
                    find deploy | wc -l
                    echo "================="

                    echo "Twig checksum:"
                    md5sum deploy/templates/home/index.html.twig

            # =========================
            # DEPLOY
            # =========================

            -   name: Deploy via SFTP
                uses: wangyucode/sftp-upload-action@v3
                with:
                    host: ssh.cluster129.hosting.ovh.net
                    port: 22

                    username: ${{ secrets.OVH_USER }}
                    password: ${{ secrets.OVH_PASSWORD }}

                    localDir: deploy
                    remoteDir: /home/sksystz/sk-systems

                    concurrency: 1

                    forceUpload: true
                    removeExtraFilesOnServer: false

                    exclude: |
                        .git/**
                        .github/**
                        node_modules/**
                        tests/**
                        var/cache/**
                        var/log/**
                        .DS_Store
                        Thumbs.db

            # =========================
            # CLEAR PRODUCTION CACHE
            # =========================

            -   name: Clear production cache
                run: |
                    RESPONSE=$(curl -L -s -w "\n%{http_code}" "https://sksystems.fr/_deploy.php?token=${{ secrets.DEPLOY_TOKEN }}")

                    HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
                    BODY=$(echo "$RESPONSE" | sed '$d')

                    echo "HTTP Status: $HTTP_CODE"
                    echo "Response Body:"
                    echo "$BODY"

                    if [ "$HTTP_CODE" != "200" ]; then
                      exit 1
                    fi



